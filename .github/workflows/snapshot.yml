name: Snapshot

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    if: vars.EBAY_LIVE_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.SNAPSHOT_DATABASE_URL }}
      ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
      EBAY_SOURCE: live
      EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
      EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
      EBAY_MARKETPLACE_ID: EBAY_US
      EBAY_CATEGORY_IDS: "169291"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        working-directory: pipeline
        run: uv sync
      - name: Run snapshot
        working-directory: pipeline
        run: uv run python -m jobs.daily_snapshot
      - name: Run matching
        working-directory: pipeline
        run: uv run python -m jobs.run_matching
      - name: Expire raw rows
        working-directory: pipeline
        run: uv run python -m jobs.expire_raw
