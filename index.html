// ---------- chart helper (from design) ----------
function chart(values, padX, padTop, padBot) {
  const W = 1000, H = 300;
  const min = Math.min(...values), max = Math.max(...values);
  const span = (max - min) || 1;
  const n = values.length;
  const innerW = W - padX * 2, innerH = H - padTop - padBot, base = H - padBot;
  const pts = values.map((v, i) => ({
    x: +(padX + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW)).toFixed(1),
    y: +(padTop + (1 - (v - min) / span) * innerH).toFixed(1),
  }));
  const line = pts.map((p, i) => (i ? 'L' : 'M') + p.x + ',' + p.y).join(' ');
  const area = 'M' + pts[0].x + ',' + base.toFixed(1) + ' ' + pts.map(p => 'L' + p.x + ',' + p.y).join(' ') + ' L' + pts[n - 1].x + ',' + base.toFixed(1) + ' Z';
  const last = pts[n - 1];
  return { line, area, lastXpct: +((last.x / W) * 100).toFixed(2), lastYpct: +((last.y / H) * 100).toFixed(2) };
}
const spark = (score, up, padT = 70) => {
  const shape = up ? RISE : FALL;
  const start = up ? score * 0.5 : score * 1.5;
  return chart(shape.map(t => start + (score - start) * t), 14, padT, padT).line;
};

}
function lineChart(ch, h, opts = {}) {

  </div>`;
}
function scoreRing(score, size, fontSize) {
  const dash = ((score / 100) * C).toFixed(1) + ' ' + C;
  return `<div style="position: relative; width: ${size}px; height: ${size}px; flex: 0 0 ${size}px;">

    </svg>

}

// ---------- data builders ----------
function buildModelData() {
  const prod = PRODUCTS.find(p => p.id === state.product) || PRODUCTS[0];
  const variants = prod.cw.map(d => ({
    ...d,
    medianDisp: usd(d.median),
    dirColor: d.rise && d.dir !== 'Stable' ? '#B0623E' : '#8A857C',
    spark: (() => {
      const shape = d.rise ? RISE : FLAT;
      const s = d.score * (d.rise ? 0.55 : 0.92);
      return chart(shape.map(t => s + (d.score - s) * t), 14, 70, 70).line;
    })(),
  }));
  const a0 = variants.find(v => v.id === state.variant) || variants[0];
  const pActive = prod.cw.reduce((s, c) => s + c.active, 0);
  const wMedian = Math.round(prod.cw.reduce((s, c) => s + c.median * c.active, 0) / pActive);
  const wScore = Math.round(prod.cw.reduce((s, c) => s + c.score * c.active, 0) / pActive);
  const meds = prod.cw.map(c => c.median);
  const topCw = [...prod.cw].sort((x, y) => y.score - x.score)[0];
  const fastCw = [...prod.cw].sort((x, y) => parseFloat(y.sd) - parseFloat(x.sd))[0];
  const model = {
    median: usd(wMedian), active: pActive, score: wScore, dir: dirOf(wScore),
    cwCount: prod.cw.length, rangeLow: usd(Math.min(...meds)), rangeHigh: usd(Math.max(...meds)),
    topName: topCw.color, topScore: topCw.score, fastName: fastCw.color, fastSd: fastCw.sd,
  };
  const modelSearch = RISE.map(t => wScore * 0.62 + (wScore - wScore * 0.62) * t);
  const cwMax = Math.max(...meds);
  const colorwayBars = [...prod.cw].sort((x, y) => y.median - x.median).map(c => ({
    name: c.color, disp: usd(c.median), w: Math.round((c.median / cwMax) * 100) + '%',
  }));
  return { prod, variants, a: a0, model, colorwayBars, modelSearchChart: chart(modelSearch, 14, 24, 26) };
}

        ${drivers.map(([l, n, v]) => `
        <div style="display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid #EBE2D2;">
          <div style="display: flex; flex-direction: column;"><span style="font-size: 13.5px; font-weight: 600;">${l}</span><span class="mono" style="font-size: 9.5px; letter-spacing: 0.04em; text-transform: uppercase; color: #9A8B77;">${n}</span></div>
          <span class="mono" style="font-size: 13px; color: #B0623E;">${v}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function viewCompare() {
  const cat = CATALOG.map(b => ({ ...b, medianDisp: usd(b.median), dirColor: b.score >= 50 ? '#B0623E' : '#8A857C' }));
  const cols = state.compare.map(id => cat.find(b => b.id === id)).filter(Boolean);
  const rows = [
    ['Median asking', b => b.medianDisp],
    ['Covetability', b => b.score + ' · ' + b.dir, true],
    ['Price · 90d', b => b.pd],
    ['Search · 30d', b => b.sd],
    ['Active listings', b => String(b.active)],
    ['Days on market', b => String(b.days)],
    ['Sell-through', b => b.sell + '%'],
    ['Confidence', b => b.conf + '%'],
    ['Era · material', b => b.era + ' · ' + b.material],
  ];
  return `${topbar('compare')}
  <div style="padding: 26px 40px 20px; border-bottom: 1px solid #E0D4BF;">
    <h2 class="serif" style="margin: 0 0 4px; font-weight: 600; font-size: 40px; line-height: 1;">Compare bags</h2>
    <span style="font-size: 13px; color: #6B5E4F;">Pick 2–4 bags — the table updates live.</span>
    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;">
      ${cat.map(b => `<span class="chip ${state.compare.includes(b.id) ? 'on' : ''}" onclick="toggleCompare('${b.id}')"><span class="sw" style="background: ${b.hex};"></span>${b.brand} ${b.model}</span>`).join('')}
    </div>
  </div>
  <div style="display: flex; align-items: stretch; border-bottom: 1px solid #E0D4BF;">
    <div style="flex: 0 0 168px; padding: 22px 20px 22px 40px; border-right: 1px solid #E0D4BF;"></div>
    ${cols.map(c => `
    <div style="flex: 1; padding: 20px 22px; border-right: 1px solid #E0D4BF; min-width: 0;">
      <div class="swatch-img" style="width: 100%; height: 88px; border-radius: 3px; margin-bottom: 12px; background-color: ${c.hex}; background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.08) 0 9px, rgba(0,0,0,0.05) 9px 18px);"></div>
      <span class="mono" style="font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #9A8B77;">${c.brand}</span>
      <div class="serif" style="font-weight: 600; font-size: 24px; line-height: 1.02;">${c.model}</div>
      <span class="mono" style="font-size: 10px; letter-spacing: 0.04em; color: #6B5E4F;">${c.variant}</span>
    </div>`).join('')}
  </div>
  ${rows.map(([label, fn, accent]) => `
  <div style="display: flex; align-items: stretch; border-top: 1px solid #EBE2D2;">
    <span class="mono" style="flex: 0 0 168px; padding: 14px 20px 14px 40px; border-right: 1px solid #E0D4BF; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #6B5E4F; display: flex; align-items: center;">${label}</span>
    ${cols.map(b => `<span class="serif" style="flex: 1; padding: 14px 22px; border-right: 1px solid #E0D4BF; font-weight: 600; font-size: 21px; color: ${accent ? b.dirColor : '#2B2520'}; display: flex; align-items: center; min-width: 0;">${fn(b)}</span>`).join('')}
  </div>`).join('')}`;
}

function toggleCompare(id) {
  const has = state.compare.includes(id);
  if (has && state.compare.length <= 2) return;
  if (!has && state.compare.length >= 4) return;
  setState({ compare: has ? state.compare.filter(x => x !== id) : [...state.compare, id] });
}

// ---------- router ----------
const VIEWS = { bag: viewBag, variant: viewVariant, brand: viewBrand, signals: viewSignals, compare: viewCompare };
function render() {
  const route = (location.hash.replace('#/', '') || 'bag');
  const view = VIEWS[route] || viewBag;
  document.getElementById('app').innerHTML = `<div class="page-wrap">${view()}</div>`;
  window.scrollTo(0, 0);
}
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
