services:
  postgres:
    image: postgres:16
    container_name: covetability-postgres
    environment:
      POSTGRES_DB: covetability
      POSTGRES_USER: covetability
      POSTGRES_PASSWORD: covetability
    ports:
      - "55432:5432"
    volumes:
      - covetability-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covetability -d covetability"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  covetability-postgres-data:
